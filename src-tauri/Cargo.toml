[package]
name = "docufinder"
version = "0.1.0"
description = "로컬 문서 검색 앱 - HWPX, Office, PDF 지원"
authors = ["Chris"]
edition = "2021"

[lib]
name = "docufinder_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# File parsing
zip = "2"
quick-xml = "0.37"
calamine = "0.26"  # Excel

# Async
tokio = { version = "1", features = ["full"] }

# File watching
notify = "8"

# Utilities
thiserror = "2"
tracing = "0.1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
