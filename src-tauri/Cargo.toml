[package]
name = "docufinder"
version = "0.1.0"
description = "로컬 문서 검색 앱 - HWPX, Office, PDF 지원"
authors = ["Chris"]
edition = "2021"

[lib]
name = "docufinder_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Database
rusqlite = { version = "0.32", features = ["bundled"] }

# File parsing
zip = "2"
quick-xml = "0.37"
calamine = "0.26"  # Excel
pdf-extract = "0.7"  # PDF

# Async
tokio = { version = "1", features = ["full"] }

# File watching
notify = "8"

# Semantic search (Phase 3) - temporarily disabled for build
# ort = { version = "2.0.0-rc.11", features = ["load-dynamic"] }
# usearch = "2.23"
# tokenizers = { version = "0.19", default-features = false, features = ["onig"] }
ndarray = "0.16"

# Utilities
thiserror = "2"
tracing = "0.1"
once_cell = "1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
