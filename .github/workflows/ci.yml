name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Security audit (npm)
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  check-backend:
    name: Backend (Rust)
    needs: check-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 프론트엔드 빌드 결과 다운로드 (중복 빌드 제거)
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # .gitignore 파일들의 CI placeholder 생성 (Tauri 빌드 스크립트용)
      - name: Create placeholders for Tauri build script
        working-directory: src-tauri
        run: |
          New-Item -ItemType Directory -Force -Path models/kosimcse-roberta-multitask
          New-Item -ItemType File -Force -Path models/kosimcse-roberta-multitask/.gitkeep
          New-Item -ItemType Directory -Force -Path resources
          New-Item -ItemType File -Force -Path resources/node.exe
          New-Item -ItemType Directory -Force -Path resources/kordoc
          New-Item -ItemType File -Force -Path resources/kordoc/.gitkeep
          New-Item -ItemType File -Force -Path icons/tray-icon.png -ErrorAction SilentlyContinue

      - name: Cargo fmt
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Security audit (cargo)
        working-directory: src-tauri
        shell: bash
        run: |
          cargo install cargo-audit --quiet
          cargo audit --ignore RUSTSEC-2026-0044 --ignore RUSTSEC-2026-0045 --ignore RUSTSEC-2026-0046 --ignore RUSTSEC-2026-0047 --ignore RUSTSEC-2026-0048 --ignore RUSTSEC-2026-0037 --ignore RUSTSEC-2026-0049 --ignore RUSTSEC-2026-0067 --ignore RUSTSEC-2026-0068 --ignore RUSTSEC-2026-0097
