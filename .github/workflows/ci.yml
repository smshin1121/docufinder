name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  check-backend:
    name: Backend (Rust)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 프론트엔드 빌드 (Tauri generate_context!()에 dist/ 필요)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # 모델 파일은 .gitignore이므로 CI에서 placeholder 생성 (Tauri 빌드 스크립트 glob 매칭용)
      - name: Create model placeholder for Tauri build script
        working-directory: src-tauri
        run: |
          New-Item -ItemType Directory -Force -Path models/kosimcse-roberta-multitask
          New-Item -ItemType File -Force -Path models/kosimcse-roberta-multitask/.gitkeep

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true
