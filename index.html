<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anything - 로컬 문서 검색</title>
    <!-- Pretendard 폰트 (로컬 번들) -->
    <link rel="stylesheet" href="/src/assets/fonts/pretendard.css" />
  </head>
  <body>
    <script>
      // 테마 플래시 방지: React 렌더링 전에 저장된 테마 적용
      try {
        const settings = localStorage.getItem('app-settings');
        if (settings) {
          const parsed = JSON.parse(settings);
          if (parsed.theme === 'dark' || (!parsed.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    </script>
    <style>
      html { background: #F8FAFC; }
      html.dark { background: #0F172A; }
      .splash { display:flex; align-items:center; justify-content:center; height:100vh; }
      .splash-spinner { width:32px; height:32px; border:3px solid #e2e8f0; border-top-color:#14b8a6; border-radius:50%; animation:spin .6s linear infinite; }
      html.dark .splash-spinner { border-color:#334155; border-top-color:#14b8a6; }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
    <div id="root"><div class="splash"><div class="splash-spinner"></div></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
